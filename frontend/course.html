<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무리없이 부산 — 코스 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#003087">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="무리없이 부산">
</head>
<body>

<!-- Skip to content (WCAG 2AA) -->
<a href="#main-content" class="skip-to-content">본문 바로가기</a>

<!-- GNB: PC 전용 상단 네비게이션 -->
<nav class="gnb" aria-label="주 메뉴">
  <div class="gnb-inner">
    <a href="/" class="gnb-logo">♿ 무리없이 부산</a>
    <ul class="gnb-menu">
      <li><a href="/">홈</a></li>
      <li><a href="/onboarding.html" aria-current="page">코스 추천</a></li>
    </ul>
    <a href="/onboarding.html" class="btn-primary gnb-cta">코스 추천받기</a>
  </div>
</nav>

<div class="page-wrapper" role="main" id="main-content">
  <!-- 모바일 헤더 -->
  <header class="app-header">
    <button class="back-btn" id="backBtnHeader" aria-label="뒤로 가기">←</button>
    <h1 id="courseTitle">코스 상세</h1>
    <span class="header-action" id="shareBtn">공유</span>
  </header>

  <!-- 모바일 레이아웃: 지도 → 개요 → 타임라인 수직 배치 -->
  <div class="mobile-course-layout">
    <!-- 지도 영역 -->
    <section class="map-area" id="mapArea" aria-label="코스 지도" aria-live="polite">
      <div id="kakaoMap"></div>
    </section>

    <!-- 코스 개요 -->
    <section class="course-overview" id="courseOverview" aria-label="코스 개요">
      <div class="loading-overlay">
        <div class="spinner" role="status" aria-label="로딩 중"></div>
        <p>코스 정보를 불러오는 중</p>
      </div>
    </section>

    <!-- 타임라인 -->
    <section class="timeline" id="timeline" aria-label="방문 순서">
      <h3>방문 순서</h3>
      <div id="timelineList"></div>
    </section>

    <!-- 하단 버튼 -->
    <div class="detail-bottom">
      <button class="btn-primary" id="shareAction">일정 카드로 공유하기</button>
      <button class="btn-outline" id="backToResults">다른 코스 보기</button>
    </div>
  </div>

  <!-- PC 레이아웃: 지도(좌) + 타임라인(우) 2컬럼 -->
  <div class="course-detail-layout">
    <!-- 왼쪽: 지도 패널 -->
    <div class="map-panel">
      <section class="map-area" id="mapAreaPc" aria-label="코스 지도 (PC)" aria-live="polite">
        <div id="kakaoMapPc"></div>
      </section>
      <section class="course-overview" id="courseOverviewPc" aria-label="코스 개요 (PC)">
        <div class="loading-overlay">
          <div class="spinner" role="status" aria-label="로딩 중"></div>
          <p>코스 정보를 불러오는 중</p>
        </div>
      </section>
    </div>

    <!-- 오른쪽: 타임라인 패널 -->
    <div class="timeline-panel">
      <section class="timeline" id="timelinePc" aria-label="방문 순서 (PC)">
        <h3>방문 순서</h3>
        <div id="timelineListPc"></div>
      </section>
      <div class="detail-bottom">
        <button class="btn-primary" id="shareActionPc">일정 카드로 공유하기</button>
        <button class="btn-outline" id="backToResultsPc">다른 코스 보기</button>
      </div>
    </div>
  </div>
</div>

<!-- 만족도 조사 모달 (공유/다른 코스 보기 시 노출) -->
<div class="satisfaction-modal" id="satisfactionModal" style="display:none" aria-modal="true" role="dialog" aria-labelledby="satisfaction-heading">
  <div class="satisfaction-backdrop" id="satisfactionBackdrop"></div>
  <section class="satisfaction-section satisfaction-section--modal" id="satisfactionBlock" aria-labelledby="satisfaction-heading">
    <h2 class="satisfaction-heading" id="satisfaction-heading">이 코스 추천이 도움이 되셨나요?</h2>
    <p class="satisfaction-subtitle">답해주시면 다음 여행자에게 더 정확한 코스를 드릴 수 있어요.</p>
    <div class="satisfaction-scale" role="radiogroup" aria-labelledby="satisfaction-heading" id="satisfactionScale">
      <button type="button" class="satisfaction-btn satisfaction-btn--low" role="radio" aria-checked="false" data-score="1" aria-label="1점 매우 불만">
        <span class="satisfaction-emoji" aria-hidden="true">😞</span>
        <span class="satisfaction-num" aria-hidden="true">1</span>
        <span class="satisfaction-label">매우 불만</span>
      </button>
      <button type="button" class="satisfaction-btn satisfaction-btn--low" role="radio" aria-checked="false" data-score="2" aria-label="2점 불만">
        <span class="satisfaction-emoji" aria-hidden="true">😕</span>
        <span class="satisfaction-num" aria-hidden="true">2</span>
        <span class="satisfaction-label">불만</span>
      </button>
      <button type="button" class="satisfaction-btn" role="radio" aria-checked="false" data-score="3" aria-label="3점 보통">
        <span class="satisfaction-emoji" aria-hidden="true">😐</span>
        <span class="satisfaction-num" aria-hidden="true">3</span>
        <span class="satisfaction-label">보통</span>
      </button>
      <button type="button" class="satisfaction-btn satisfaction-btn--high" role="radio" aria-checked="false" data-score="4" aria-label="4점 만족">
        <span class="satisfaction-emoji" aria-hidden="true">🙂</span>
        <span class="satisfaction-num" aria-hidden="true">4</span>
        <span class="satisfaction-label">만족</span>
      </button>
      <button type="button" class="satisfaction-btn satisfaction-btn--high" role="radio" aria-checked="false" data-score="5" aria-label="5점 매우 만족">
        <span class="satisfaction-emoji" aria-hidden="true">😊</span>
        <span class="satisfaction-num" aria-hidden="true">5</span>
        <span class="satisfaction-label">매우 만족</span>
      </button>
    </div>

    <div class="satisfaction-reason-panel" id="satisfactionReasonPanel" aria-hidden="true">
      <p class="satisfaction-reason-guide">어떤 점이 아쉬우셨나요? (복수 선택 가능)</p>
      <div class="satisfaction-reason-chips" role="group" aria-label="불만 사유 선택" id="satisfactionReasonChips">
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="접근성 정보 오류">접근성 정보 오류</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="이동 거리 과다">이동 거리가 너무 많아요</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="이동 유형 불일치">내 이동 유형과 안 맞아요</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="관광지 정보 부정확">관광지 정보가 부정확해요</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="다양성 부족">비슷한 곳만 나와요</button>
        <button type="button" class="satisfaction-reason-chip" aria-pressed="false" data-reason="일정 배분 이상">일정 배분이 이상해요</button>
      </div>
      <textarea class="satisfaction-textarea" id="satisfactionText" rows="3" maxlength="300" placeholder="더 나은 추천을 위해 의견을 남겨주세요 (선택)" aria-label="추가 의견 입력 (선택사항, 최대 300자)"></textarea>
      <div class="satisfaction-char-count" aria-live="polite"><span id="satisfactionCharCount">0</span>/300</div>
    </div>

    <div class="satisfaction-actions">
      <button type="button" class="btn-primary satisfaction-submit" id="satisfactionSubmit" disabled>의견 보내고 계속하기</button>
      <button type="button" class="satisfaction-skip" id="satisfactionSkip">건너뛰기</button>
    </div>

    <div class="satisfaction-done" id="satisfactionDone" hidden role="status" aria-live="polite">
      소중한 의견 감사합니다. 잠시 후 계속 진행합니다.
    </div>
  </section>
</div>

<script src="/runtime-config.js" defer></script>
<script src="/js/app.js" defer></script>
<script src="/js/course.js?v=20260505-mapfix2" defer></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
